<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Engram by Clarit.ai</title>
  <desc id="desc">Comparative agent memory demo showing reduced context replay and token waste.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061019" />
      <stop offset="0.55" stop-color="#071923" />
      <stop offset="1" stop-color="#032235" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#00A1FF" />
      <stop offset="0.5" stop-color="#6A5CFF" />
      <stop offset="1" stop-color="#66F2D5" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#F5F8FB" />
  <rect x="40" y="40" width="1120" height="550" rx="34" fill="url(#panel)" />
  <path d="M86 132h480" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.9" />
  <text x="86" y="104" fill="#7DCBFF" font-family="Inter, Manrope, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="2">clarit.ai  |  ENGRAM</text>
  <text x="86" y="226" fill="#FFFFFF" font-family="Inter, Manrope, Arial, sans-serif" font-size="76" font-weight="800">Agent memory</text>
  <text x="86" y="306" fill="#FFFFFF" font-family="Inter, Manrope, Arial, sans-serif" font-size="76" font-weight="800">you can see.</text>
  <text x="90" y="375" fill="#C7D5DF" font-family="Inter, Manrope, Arial, sans-serif" font-size="28" font-weight="500">Compare replayed context and token waste</text>
  <text x="90" y="415" fill="#C7D5DF" font-family="Inter, Manrope, Arial, sans-serif" font-size="28" font-weight="500">inside a live AI conversation.</text>
  <g filter="url(#glow)">
    <rect x="790" y="150" width="250" height="96" rx="22" fill="#0D2230" stroke="#2F83B8" />
    <text x="824" y="190" fill="#84D9FF" font-family="Inter, Manrope, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="2">STATELESS</text>
    <text x="824" y="222" fill="#FFFFFF" font-family="Inter, Manrope, Arial, sans-serif" font-size="34" font-weight="800">1,101 tok</text>
    <rect x="714" y="320" width="340" height="116" rx="24" fill="#008EE6" />
    <text x="750" y="363" fill="#FFFFFF" font-family="Inter, Manrope, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="2">ENGRAM MEMORY</text>
    <text x="750" y="404" fill="#FFFFFF" font-family="Inter, Manrope, Arial, sans-serif" font-size="38" font-weight="800">109 tok</text>
  </g>
  <circle cx="722" cy="198" r="9" fill="#E89460" />
  <circle cx="716" cy="376" r="9" fill="#66F2D5" />
  <path d="M722 198 C690 240 684 304 716 376" fill="none" stroke="#D4E5EF" stroke-width="3" stroke-dasharray="10 12" opacity="0.55" />
  <text x="90" y="526" fill="#66F2D5" font-family="Inter, Manrope, Arial, sans-serif" font-size="22" font-weight="800">The cure for Agent Amnesia</text>
</svg>